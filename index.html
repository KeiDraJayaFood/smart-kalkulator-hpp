<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        <!-- HEADER ASLI -->
        <header class="bg-blue-600 p-5 text-white text-center font-bold text-xl shadow-md">
            SMART KALKULATOR HPP
        </header>

        <!-- LOGIN SECTION (Tampilan Awal) -->
        <div id="login-section" class="p-6">
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-3">
            <div class="flex gap-2">
                <button onclick="handleLogin()" class="w-1/2 bg-blue-600 text-white p-3 rounded-lg font-bold">LOGIN</button>
                <button onclick="handleSignUp()" class="w-1/2 bg-gray-200 text-gray-700 p-3 rounded-lg font-bold">DAFTAR</button>
            </div>
        </div>

        <!-- MAIN SECTION -->
        <div id="main-section" class="hidden">
            <!-- TAB MENU (UKURAN SESUAI SCREENSHOT) -->
            <div class="flex border-b text-xs font-bold text-gray-500 uppercase">
                <button onclick="openTab('tab-bahan')" id="btn-tab-bahan" class="w-1/3 py-4 border-b-2 border-blue-600 text-blue-600">Database Bahan</button>
                <button onclick="openTab('tab-kalkulator')" id="btn-tab-kalkulator" class="w-1/3 py-4">Kalkulator</button>
                <button onclick="openTab('tab-grafik')" id="btn-tab-grafik" class="w-1/3 py-4">Grafik</button>
            </div>

            <!-- TAB 1: DATABASE BAHAN -->
            <div id="tab-bahan" class="tab-content active p-4">
                <!-- FORM TAMBAH BAHAN (SESUAI SCREENSHOT) -->
                <div class="bg-[#f0f7ff] p-4 rounded-xl border border-blue-100 mb-6">
                    <h3 id="form-title" class="font-bold text-blue-800 mb-4 text-sm uppercase">Tambah Bahan Baru</h3>
                    <input type="hidden" id="edit-id">
                    <input type="text" id="nama_bahan" placeholder="Nama Bahan" class="w-full p-3 border rounded-lg mb-3">
                    
                    <!-- KATEGORI YANG TADI HILANG -->
                    <select id="kategori_bahan" class="w-full p-3 border rounded-lg mb-3 bg-white text-gray-500 text-sm">
                        <option value="Bahan Pokok">Bahan Pokok</option>
                        <option value="Protein">Protein</option>
                        <option value="Bumbu">Bumbu</option>
                        <option value="Kemasan">Kemasan</option>
                        <option value="Lain-lain">Lain-lain</option>
                    </select>

                    <div class="flex gap-2 mb-3">
                        <input type="number" id="harga_beli" placeholder="Harga Beli" class="w-1/2 p-3 border rounded-lg">
                        <input type="number" id="isi_kemasan" placeholder="Isi/Berat" class="w-1/2 p-3 border rounded-lg">
                    </div>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="satuan_bahan" placeholder="Satuan (gr/ml)" class="w-1/2 p-3 border rounded-lg text-sm">
                        <input type="number" id="wastage" placeholder="Wastage %" class="w-1/2 p-3 border rounded-lg text-sm">
                    </div>
                    <button id="btn-simpan" onclick="simpanBahan()" class="w-full bg-[#22a447] text-white p-4 rounded-xl font-black text-lg shadow-md">SIMPAN BAHAN</button>
                    <button id="btn-batal" onclick="resetForm()" class="hidden w-full bg-gray-400 text-white p-2 rounded-lg mt-2 font-bold">BATAL</button>
                </div>

                <h3 class="font-bold text-gray-600 mb-4 text-sm uppercase">Daftar Bahan Anda</h3>
                <div id="list-bahan" class="space-y-3">
                    <!-- List data akan muncul di sini -->
                </div>
            </div>

            <!-- TAB 2 & 3 -->
            <div id="tab-kalkulator" class="tab-content p-10 text-center">Fitur Kalkulator segera hadir.</div>
            <div id="tab-grafik" class="tab-content p-10 text-center">Fitur Grafik segera hadir.</div>

            <button onclick="handleLogout()" class="w-full text-gray-400 text-[10px] mt-10 mb-10 underline">Logout</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else location.reload();
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert("Cek email Anda untuk konfirmasi pendaftaran.");
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                muatDaftarBahan();
            }
        };

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('#main-section button').forEach(b => {
                b.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
            });
            document.getElementById('btn-' + tabId).classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
        }

        async function simpanBahan() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const id = document.getElementById('edit-id').value;
            const payload = {
                user_id: user.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                kategori: document.getElementById('kategori_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };

            let res;
            if (id) res = await supabaseClient.from('bahan_baku').update(payload).eq('id', id);
            else res = await supabaseClient.from('bahan_baku').insert([payload]);

            if (res.error) alert(res.error.message);
            else {
                resetForm();
                muatDaftarBahan();
            }
        }

        async function muatDaftarBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('list-bahan');
            if (data) {
                list.innerHTML = data.map(b => {
                    // FORMAT TANGGAL JAM WIB YANG TADI HILANG
                    const tgl = new Date(b.created_at).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' });
                    return `
                        <div class="p-4 bg-white border rounded-xl shadow-sm flex justify-between items-center">
                            <div>
                                <p class="font-bold text-gray-800 text-lg">${b.nama_bahan}</p>
                                <p class="text-blue-600 font-bold text-sm">Rp ${b.harga_beli.toLocaleString()} / ${b.isi_kemasan} ${b.satuan}</p>
                                <p class="text-[10px] text-gray-400 mt-1">${tgl} WIB | ${b.kategori}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick='siapkanEdit(${JSON.stringify(b)})' class="border border-blue-500 text-blue-500 text-[10px] font-bold px-3 py-1 rounded">EDIT</button>
                                <button onclick="hapusBahan(${b.id})" class="border border-red-500 text-red-500 text-[10px] font-bold px-3 py-1 rounded">HAPUS</button>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function siapkanEdit(b) {
            document.getElementById('form-title').innerText = "EDIT BAHAN";
            document.getElementById('edit-id').value = b.id;
            document.getElementById('nama_bahan').value = b.nama_bahan;
            document.getElementById('kategori_bahan').value = b.kategori;
            document.getElementById('harga_beli').value = b.harga_beli;
            document.getElementById('isi_kemasan').value = b.isi_kemasan;
            document.getElementById('satuan_bahan').value = b.satuan;
            document.getElementById('wastage').value = b.wastage;
            document.getElementById('btn-simpan').innerText = "UPDATE BAHAN";
            document.getElementById('btn-batal').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "TAMBAH BAHAN BARU";
            document.getElementById('edit-id').value = "";
            document.getElementById('nama_bahan').value = "";
            document.getElementById('harga_beli').value = "";
            document.getElementById('isi_kemasan').value = "";
            document.getElementById('satuan_bahan').value = "";
            document.getElementById('wastage').value = "";
            document.getElementById('btn-simpan').innerText = "SIMPAN BAHAN";
            document.getElementById('btn-batal').classList.add('hidden');
        }

        async function hapusBahan(id) {
            if(confirm("Hapus?")) {
                await supabaseClient.from('bahan_baku').delete().eq('id', id);
                muatDaftarBahan();
            }
        }
    </script>
</body>
</html>
