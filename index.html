<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <!-- Container Utama -->
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-20">
        
        <!-- Header -->
        <header class="bg-blue-600 p-4 text-white text-center font-bold text-xl shadow-md">
            SMART KALKULATOR HPP
        </header>

        <!-- Area Login (Muncul jika belum login) -->
        <div id="login-section" class="p-6">
            <h2 class="text-center text-lg font-semibold mb-4">Login User</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded mb-3">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded mb-3">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">LOGIN / DAFTAR</button>
        </div>

        <!-- Area Aplikasi (Muncul jika sudah login) -->
        <div id="main-section" class="hidden">
            <!-- Navigasi Tab -->
            <div class="flex border-b">
                <button onclick="openTab('tab-bahan')" class="w-1/3 py-3 font-semibold border-b-2 border-blue-600">Bahan</button>
                <button onclick="openTab('tab-kalkulator')" class="w-1/3 py-3 font-semibold">Kalkulator</button>
                <button onclick="openTab('tab-grafik')" class="w-1/3 py-3 font-semibold">Grafik</button>
            </div>

            <!-- Isi Tab 1: Database Bahan -->
            <div id="tab-bahan" class="tab-content active p-4">
                <h3 class="font-bold mb-2">Tambah Bahan Baru</h3>
                <!-- Form input akan kita buat di step berikutnya -->
                <div id="form-bahan" class="space-y-3"></div>
            </div>

            <!-- Isi Tab 2: Kalkulator -->
            <div id="tab-kalkulator" class="tab-content p-4">
                <h3 class="font-bold">Kalkulator HPP & Profit</h3>
            </div>

            <!-- Isi Tab 3: Grafik -->
            <div id="tab-grafik" class="tab-content p-4">
                <h3 class="font-bold">Grafik Analisa</h3>
            </div>
        </div>

        <!-- Tombol Logout -->
        <button id="btn-logout" onclick="handleLogout()" class="hidden fixed bottom-5 right-5 bg-red-500 text-white p-2 rounded-full shadow-lg text-sm">Logout</button>
    </div>

    <script>
        // MASUKKAN API KEY ANDA DI SINI NANTI
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        // Fungsi Login & Logout akan kita lengkapi di step berikutnya
    </script>
</body>
</html>
