<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative pb-20">
        <header class="bg-blue-600 p-4 text-white text-center font-bold text-xl shadow-md">
            SMART KALKULATOR HPP
        </header>

        <!-- AREA LOGIN -->
        <div id="login-section" class="p-6">
            <h2 class="text-center text-lg font-semibold mb-4">Akses Pengguna</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded mb-3">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded mb-3">
            <div class="flex gap-2">
                <button onclick="handleLogin()" class="w-1/2 bg-blue-600 text-white p-3 rounded font-bold">LOGIN</button>
                <button onclick="handleSignUp()" class="w-1/2 bg-gray-200 text-gray-700 p-3 rounded font-bold text-sm">DAFTAR BARU</button>
            </div>
            <p id="auth-msg" class="text-red-500 text-xs mt-3 text-center"></p>
        </div>

        <!-- AREA APLIKASI UTAMA -->
        <div id="main-section" class="hidden">
            <div class="flex border-b text-xs">
                <button onclick="openTab('tab-bahan')" id="btn-tab-bahan" class="w-1/3 py-3 font-semibold border-b-2 border-blue-600 text-blue-600 uppercase">Database Bahan</button>
                <button onclick="openTab('tab-kalkulator')" id="btn-tab-kalkulator" class="w-1/3 py-3 font-semibold text-gray-500 uppercase">Kalkulator</button>
                <button onclick="openTab('tab-grafik')" id="id-btn-tab-grafik" class="w-1/3 py-3 font-semibold text-gray-500 uppercase">Grafik</button>
            </div>

            <!-- TAB 1: BAHAN -->
            <div id="tab-bahan" class="tab-content active p-4">
                <!-- ... (Isi tab bahan yang sudah ada) ... -->
            </div>

            <!-- TAB 2: KALKULATOR (PASTIKAN BAGIAN INI ADA) -->
            <div id="tab-kalkulator" class="tab-content p-4">
                <div class="bg-orange-50 p-4 rounded-lg border border-orange-200 mb-6">
                    <h3 class="font-bold text-orange-800 mb-3 text-sm uppercase">Buat Resep Baru</h3>
                    <input type="text" id="nama_resep" placeholder="Nama Menu (Contoh: Ayam Bakar)" class="w-full p-3 border rounded text-sm mb-3 shadow-sm">
                    
                    <div class="bg-white p-3 rounded border mb-3 shadow-sm">
                        <label class="text-[10px] font-bold text-gray-500 block mb-1">PILIH BAHAN:</label>
                        <select id="pilih_bahan_kalkulator" class="w-full p-2 border rounded text-sm mb-3 bg-gray-50"></select>
                        <div class="flex gap-2">
                            <input type="number" id="berat_pakai" placeholder="Berat/Qty" class="w-1/2 p-2 border rounded text-sm">
                            <button onclick="tambahBahanKeResep()" class="w-1/2 bg-orange-600 text-white text-xs font-bold rounded shadow">TAMBAH</button>
                        </div>
                    </div>

                    <div id="list-bahan-resep" class="space-y-2 mb-4">
                        <!-- List bahan sementara akan muncul di sini -->
                    </div>

                    <div class="border-t-2 border-dashed border-orange-200 pt-3">
                        <div class="flex justify-between items-center font-bold text-xl text-gray-800">
                            <span class="text-sm">TOTAL HPP:</span>
                            <span id="total-hpp-display">Rp 0</span>
                        </div>
                        <button onclick="simpanResepFinal()" class="w-full bg-blue-700 text-white p-4 rounded-xl font-bold mt-4 shadow-lg active:scale-95 transition-transform">SIMPAN RESEP</button>
                    </div>
                </div>
            </div>

            <!-- TAB 3: GRAFIK -->
            <div id="tab-grafik" class="tab-content p-4 text-center">
                <p class="text-gray-400 italic mt-10">Fitur Grafik segera hadir.</p>
            </div>
            
            <button onclick="handleLogout()" class="w-full text-red-500 text-[10px] mt-10 mb-10 underline">LOGOUT DARI APLIKASI</button>
        </div>

    <script>
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // CEK LOGIN SAAT HALAMAN DIBUKA
        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                showApp();
            }
        };

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            // Update warna tombol tab
            document.querySelectorAll('.flex button').forEach(b => {
                b.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
                b.classList.add('text-gray-500');
            });
            document.getElementById('btn-' + tabId).classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
            if(tabId === 'tab-bahan') muatDaftarBahan();
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Pendaftaran berhasil! Silakan cek email untuk verifikasi (jika diaktifkan) atau langsung login.");
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                document.getElementById('auth-msg').innerText = error.message;
            } else {
                showApp();
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        function showApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            muatDaftarBahan();
        }

        // LOGIKA FITUR TAB 1: BAHAN
        async function simpanBahan() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const payload = {
                user_id: user.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                kategori: document.getElementById('kategori_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };

            const { error } = await supabaseClient.from('bahan_baku').insert([payload]);
            if (error) {
                alert("Gagal menyimpan: " + error.message);
            } else {
                // Ganti alert lama dengan ini agar muncul notifikasi keren di bawah layar
                const toast = document.createElement("div");
                toast.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-green-600 text-white px-6 py-3 rounded-full shadow-xl font-bold text-sm z-50 animate-bounce";
                toast.innerText = "BERHASIL SIMPAN BAHAN ✅";
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000); // Hilang otomatis dalam 3 detik
                // Kosongkan form sesuai permintaan
                document.getElementById('nama_bahan').value = "";
                document.getElementById('harga_beli').value = "";
                document.getElementById('isi_kemasan').value = "";
                document.getElementById('satuan_bahan').value = "";
                document.getElementById('wastage').value = "";
                muatDaftarBahan();
            }
        }

        async function muatDaftarBahan() {
            const { data, error } = await supabaseClient.from('bahan_baku').select('*').order('created_at', { ascending: false });
            const listDiv = document.getElementById('list-bahan');
            if (data) {
                listDiv.innerHTML = data.map(b => `
                    <div class="p-3 border rounded shadow-sm bg-gray-50 flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${b.nama_bahan} <span class="font-normal text-gray-500">(${b.kategori})</span></p>
                            <p class="text-blue-600 font-semibold">Rp ${b.harga_beli.toLocaleString()} / ${b.isi_kemasan} ${b.satuan}</p>
                            <p class="text-[10px] text-gray-400 italic">${new Date(b.created_at).toLocaleString('id-ID')}</p>
                        </div>
                        <button onclick="hapusBahan(${b.id})" class="text-red-500 font-bold border border-red-200 px-2 py-1 rounded bg-white">HAPUS</button>
                    </div>
                `).join('');
            }
        }

        async function hapusBahan(id) {
            if(confirm("Hapus bahan ini secara permanen?")) {
                await supabaseClient.from('bahan_baku').delete().eq('id', id);
                muatDaftarBahan();
            }
        }
        let keranjangBahan = [];

        // Fungsi ini dipanggil setiap kali tab kalkulator dibuka
        async function muatOpsiBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*');
            const select = document.getElementById('pilih_bahan_kalkulator');
            if (data) {
                select.innerHTML = data.map(b => `<option value="${b.id}">${b.nama_bahan} (${b.satuan})</option>`).join('');
            }
        }

        // Jalankan muatOpsiBahan saat pindah ke tab kalkulator
        const originalOpenTab = openTab;
        openTab = function(tabId) {
            originalOpenTab(tabId);
            if(tabId === 'tab-kalkulator') muatOpsiBahan();
        };

        let keranjangBahan = [];

        function tambahBahanKeResep() {
            const select = document.getElementById('pilih_bahan_kalkulator');
            const berat = parseFloat(document.getElementById('berat_pakai').value);
            
            if (!berat) return alert("Masukkan berat!");

            // Ambil data bahan dari Supabase secara lokal (kita cari dari opsi select)
            muatDataBahanSatu(select.value, berat);
        }

        async function muatDataBahanSatu(idBahan, berat) {
            const { data } = await supabaseClient.from('bahan_baku').select('*').eq('id', idBahan).single();
            
            if (data) {
                // RUMUS HPP: (Harga Beli / Isi Kemasan) * Berat Pakai * (1 + Wastage/100)
                const hargaPerSatuan = data.harga_beli / data.isi_kemasan;
                const biaya = hargaPerSatuan * berat * (1 + (data.wastage / 100));
                
                keranjangBahan.push({
                    nama: data.nama_bahan,
                    berat: berat,
                    satuan: data.satuan,
                    biaya: biaya
                });

                renderKeranjang();
                document.getElementById('berat_pakai').value = "";
            }
        }

        function renderKeranjang() {
            const list = document.getElementById('list-bahan-resep');
            let total = 0;
            
            list.innerHTML = keranjangBahan.map((item, index) => {
                total += item.biaya;
                return `
                    <div class="flex justify-between text-xs bg-white p-2 rounded border shadow-sm">
                        <span>${item.nama} (${item.berat}${item.satuan})</span>
                        <span class="font-bold text-orange-700">Rp ${Math.round(item.biaya).toLocaleString()}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('total-hpp-display').innerText = "Rp " + Math.round(total).toLocaleString();
        }
    </script>
</body>
</html>
