<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative pb-20">
        <header class="bg-blue-600 p-4 text-white text-center font-bold text-xl shadow-md uppercase">SMART Kalkulator HPP</header>

        <!-- LOGIN SECTION -->
        <div id="login-section" class="p-6">
            <h2 class="text-center text-lg font-semibold mb-4">Akses Pengguna</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded mb-3">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded mb-3">
            <div class="flex gap-2">
                <button onclick="handleLogin()" class="w-1/2 bg-blue-600 text-white p-3 rounded font-bold">LOGIN</button>
                <button onclick="handleSignUp()" class="w-1/2 bg-gray-200 text-gray-700 p-3 rounded font-bold text-sm">DAFTAR</button>
            </div>
            <p id="auth-msg" class="text-red-500 text-xs mt-3 text-center"></p>
        </div>

        <!-- MAIN SECTION -->
        <div id="main-section" class="hidden">
            <div class="flex border-b text-[10px] font-bold">
                <button onclick="openTab('tab-bahan')" id="btn-tab-bahan" class="w-1/3 py-3 border-b-2 border-blue-600 text-blue-600 uppercase">Bahan</button>
                <button onclick="openTab('tab-kalkulator')" id="btn-tab-kalkulator" class="w-1/3 py-3 text-gray-500 uppercase">Kalkulator</button>
                <button onclick="openTab('tab-grafik')" id="btn-tab-grafik" class="w-1/3 py-3 text-gray-500 uppercase">Grafik</button>
            </div>

            <!-- TAB BAHAN -->
            <div id="tab-bahan" class="tab-content active p-4">
                <div class="bg-blue-50 p-3 rounded border mb-4">
                    <input type="text" id="nama_bahan" placeholder="Nama Bahan" class="w-full p-2 border rounded mb-2 text-sm">
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="harga_beli" placeholder="Harga Beli" class="w-1/2 p-2 border rounded text-sm">
                        <input type="number" id="isi_kemasan" placeholder="Isi" class="w-1/2 p-2 border rounded text-sm">
                    </div>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="satuan_bahan" placeholder="Satuan (gr)" class="w-1/2 p-2 border rounded text-sm">
                        <input type="number" id="wastage" placeholder="Wastage %" class="w-1/2 p-2 border rounded text-sm">
                    </div>
                    <button onclick="simpanBahan()" class="w-full bg-green-600 text-white p-2 rounded font-bold">SIMPAN BAHAN</button>
                </div>
                <div id="list-bahan" class="space-y-2"></div>
            </div>

            <!-- TAB KALKULATOR -->
            <div id="tab-kalkulator" class="tab-content p-4">
                <div class="bg-orange-50 p-3 rounded border mb-4">
                    <input type="text" id="nama_resep" placeholder="Nama Menu" class="w-full p-2 border rounded mb-2 text-sm">
                    <select id="pilih_bahan_kalkulator" class="w-full p-2 border rounded mb-2 text-sm"></select>
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="berat_pakai" placeholder="Berat Pakai" class="w-2/3 p-2 border rounded text-sm">
                        <button onclick="tambahBahanKeResep()" class="w-1/3 bg-orange-600 text-white rounded text-xs font-bold">TAMBAH</button>
                    </div>
                    <div id="list-bahan-resep" class="my-3 space-y-1"></div>
                    <div class="border-t pt-2 flex justify-between font-bold">
                        <span>TOTAL HPP:</span>
                        <span id="total-hpp-display">Rp 0</span>
                    </div>
                </div>
            </div>

            <button onclick="handleLogout()" class="w-full text-red-500 text-[10px] mt-10 underline">LOGOUT</button>
        </div>
    </div>

    <script>
        // MASUKKAN URL & KEY ANDA DI SINI
        const SUPABASE_URL = "ISI_URL_ANDA";
        const SUPABASE_KEY = "ISI_KEY_ANDA";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message);
            else location.reload();
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert(error.message);
            else alert("Pendaftaran Berhasil! Silakan Login.");
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                muatDaftarBahan();
            }
        };

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'tab-kalkulator') muatOpsiBahan();
        }

        async function simpanBahan() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const payload = {
                user_id: user.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };
            const { error } = await supabaseClient.from('bahan_baku').insert([payload]);
            if (error) alert(error.message);
            else { alert("BERHASIL SIMPAN BAHAN"); muatDaftarBahan(); }
        }

        async function muatDaftarBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*');
            const list = document.getElementById('list-bahan');
            if (data) {
                list.innerHTML = data.map(b => `<div class="p-2 border rounded text-xs">${b.nama_bahan} - Rp ${b.harga_beli.toLocaleString()}</div>`).join('');
            }
        }

        async function muatOpsiBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*');
            const select = document.getElementById('pilih_bahan_kalkulator');
            if (data && select) {
                select.innerHTML = data.map(b => `<option value="${b.id}">${b.nama_bahan}</option>`).join('');
            }
        }
    </script>
</body>
</html>
