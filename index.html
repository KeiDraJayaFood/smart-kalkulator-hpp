<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Animasi Toast */
        .animate-toast {
            animation: slideUp 0.3s ease-out forwards;
        }
        @keyframes slideUp {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative pb-20">
        <header class="bg-blue-600 p-4 text-white text-center font-bold text-xl shadow-md uppercase tracking-tight">
            SMART KALKULATOR HPP
        </header>

        <!-- AREA LOGIN -->
        <div id="login-section" class="p-8">
            <h2 class="text-center text-lg font-semibold mb-6 text-gray-700 uppercase tracking-wide">Akses Pengguna</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3.5 border border-gray-200 rounded-lg mb-3 outline-none focus:border-blue-500 transition-all">
            <input type="password" id="password" placeholder="Password" class="w-full p-3.5 border border-gray-200 rounded-lg mb-4 outline-none focus:border-blue-500 transition-all">
            <div class="flex gap-3">
                <button onclick="handleLogin()" class="w-1/2 bg-blue-600 text-white p-3.5 rounded-lg font-bold hover:bg-blue-700 shadow-md transition-all active:scale-95">LOGIN</button>
                <button onclick="handleSignUp()" class="w-1/2 bg-gray-100 text-gray-600 p-3.5 rounded-lg font-bold text-sm hover:bg-gray-200 transition-all active:scale-95">DAFTAR BARU</button>
            </div>
            <p id="auth-msg" class="text-xs mt-6 text-center font-medium"></p>
        </div>

        <!-- AREA APLIKASI UTAMA -->
        <div id="main-section" class="hidden">
            <div class="flex border-b text-xs font-bold bg-gray-50">
                <button onclick="openTab('tab-bahan')" id="btn-tab-bahan" class="w-1/3 py-4 border-b-2 border-blue-600 text-blue-600 tracking-wider">DATABASE BAHAN</button>
                <button onclick="openTab('tab-kalkulator')" id="btn-tab-kalkulator" class="w-1/3 py-4 text-gray-400 tracking-wider">KALKULATOR</button>
                <button onclick="openTab('tab-grafik')" id="btn-tab-grafik" class="w-1/3 py-4 text-gray-400 tracking-wider">GRAFIK</button>
            </div>

            <div id="tab-bahan" class="tab-content active p-4">
                <div class="bg-blue-50/50 p-4 rounded-xl border border-blue-100 mb-6 shadow-sm">
                    <h3 id="form-title" class="font-bold text-blue-800 mb-4 text-xs uppercase tracking-widest">Tambah Bahan Baru</h3>
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" id="nama_bahan" placeholder="Nama Bahan" class="p-3 border border-gray-200 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-200">
                        <select id="kategori_bahan" class="p-3 border border-gray-200 rounded-lg text-sm bg-white outline-none focus:ring-2 focus:ring-blue-200">
                            <option value="Karbo">Karbo</option>
                            <option value="Protein">Protein</option>
                            <option value="Sayur">Sayur</option>
                            <option value="Bumbu">Bumbu</option>
                            <option value="Lain-lain">Lain-lain</option>
                        </select>
                        <div class="flex gap-2">
                            <input type="number" id="harga_beli" placeholder="Harga Beli (Rp)" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                            <input type="number" id="isi_kemasan" placeholder="Isi Kemasan" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" id="satuan_bahan" placeholder="Satuan (gr/ml/pcs)" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                            <input type="number" id="wastage" placeholder="Wastage (%)" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                        </div>
                        <div class="flex flex-col gap-2 mt-2">
                            <button id="btn-simpan" onclick="simpanBahan()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-green-700 active:scale-95 transition-all uppercase text-sm tracking-widest">Simpan Bahan</button>
                            <button id="btn-batal-edit" onclick="resetForm()" class="hidden w-full bg-gray-400 text-white p-2 rounded-lg font-bold text-[10px] uppercase tracking-widest">Batal Edit</button>
                        </div>
                    </div>
                </div>
                
                <h3 class="font-bold mb-4 text-[10px] uppercase tracking-[0.3em] text-gray-400 text-center">Daftar Database Bahan</h3>
                <div id="list-bahan" class="space-y-3 pb-10"></div>
            </div>

            <div id="tab-kalkulator" class="tab-content p-4">
                <p class="text-center text-gray-400 italic mt-20 text-sm">Fitur Kalkulator dalam pengembangan...</p>
            </div>

            <div id="tab-grafik" class="tab-content p-4">
                <p class="text-center text-gray-400 italic mt-20 text-sm">Fitur Grafik dalam pengembangan...</p>
            </div>
            
            <button onclick="handleLogout()" class="w-full text-red-400 text-[10px] mt-10 mb-20 underline font-bold uppercase tracking-widest">Logout Dari Aplikasi</button>
        </div>
    </div>

    <!-- MODAL KONFIRMASI HAPUS ELEGANT -->
    <div id="modal-hapus" class="hidden fixed inset-0 bg-black/50 z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl font-bold">!</div>
            <h3 class="font-bold text-gray-800 text-lg mb-2">Hapus Bahan?</h3>
            <p class="text-gray-500 text-sm mb-6">Data yang dihapus tidak dapat dikembalikan lagi.</p>
            <div class="flex gap-3">
                <button onclick="closeModalHapus()" class="w-1/2 py-3 rounded-xl font-bold text-gray-400 bg-gray-50 hover:bg-gray-100 transition-all">BATAL</button>
                <button id="confirm-delete-btn" class="w-1/2 py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg shadow-red-200 transition-all">YA, HAPUS</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let idBahanAkanDihapus = null;

        // Toast Notification Profesional
        function showToast(msg, type = 'success') {
            const toast = document.createElement("div");
            const color = type === 'success' ? 'bg-green-600' : 'bg-red-500';
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 ${color} text-white px-8 py-3.5 rounded-full shadow-2xl font-bold text-xs z-[200] animate-toast tracking-widest uppercase`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = '0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // --- AUTH LOGIC ---
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('auth-msg').innerText = "Gagal Login: " + error.message;
            else location.reload();
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) document.getElementById('auth-msg').innerText = error.message;
            else showToast("CEK EMAIL VERIFIKASI ✅");
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                muatDaftarBahan();
            }
        };

        // --- TABS & FORM ---
        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('#main-section .flex button').forEach(b => {
                b.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
                b.classList.add('text-gray-400');
            });
            document.getElementById('btn-' + tabId).classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "Tambah Bahan Baru";
            document.getElementById('btn-simpan').innerText = "SIMPAN BAHAN";
            document.getElementById('edit-id').value = "";
            document.getElementById('btn-batal-edit').classList.add('hidden');
            document.getElementById('nama_bahan').value = "";
            document.getElementById('harga_beli').value = "";
            document.getElementById('isi_kemasan').value = "";
            document.getElementById('satuan_bahan').value = "";
            document.getElementById('wastage').value = "";
        }

        // --- CRUD DATABASE ---
        async function simpanBahan() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const id = document.getElementById('edit-id').value;
            const payload = {
                user_id: user.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                kategori: document.getElementById('kategori_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };

            if (!payload.nama_bahan || !payload.harga_beli) return showToast("LENGKAPI DATA! ⚠️", "error");

            let result;
            if (id) {
                result = await supabaseClient.from('bahan_baku').update(payload).eq('id', id);
                if (!result.error) showToast("DATA BERHASIL DIUPDATE 🔄");
            } else {
                result = await supabaseClient.from('bahan_baku').insert([payload]);
                if (!result.error) showToast("DATA BERHASIL DISIMPAN ✅");
            }

            if (result.error) showToast("GAGAL: " + result.error.message, "error");
            else { resetForm(); muatDaftarBahan(); }
        }

        async function muatDaftarBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*').order('created_at', { ascending: false });
            const listDiv = document.getElementById('list-bahan');
            if (data) {
                listDiv.innerHTML = data.map(b => `
                    <div class="p-4 border border-gray-100 rounded-xl shadow-sm bg-white flex justify-between items-center transition-all hover:shadow-md">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${b.nama_bahan} <span class="font-medium text-gray-400 text-[10px] uppercase ml-1">(${b.kategori})</span></p>
                            <p class="text-blue-600 font-bold text-xs mt-0.5">Rp ${b.harga_beli.toLocaleString()} / ${b.isi_kemasan} ${b.satuan}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='siapkanEdit(${JSON.stringify(b)})' class="bg-blue-50 text-blue-600 font-bold px-3 py-2 rounded-lg text-[10px] hover:bg-blue-100 transition-all">EDIT</button>
                            <button onclick="openModalHapus(${b.id})" class="bg-red-50 text-red-500 font-bold px-3 py-2 rounded-lg text-[10px] hover:bg-red-100 transition-all">HAPUS</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function siapkanEdit(b) {
            document.getElementById('form-title').innerText = "Edit Bahan";
            document.getElementById('btn-simpan').innerText = "UPDATE DATA";
            document.getElementById('btn-batal-edit').classList.remove('hidden');
            document.getElementById('edit-id').value = b.id;
            document.getElementById('nama_bahan').value = b.nama_bahan;
            document.getElementById('kategori_bahan').value = b.kategori;
            document.getElementById('harga_beli').value = b.harga_beli;
            document.getElementById('isi_kemasan').value = b.isi_kemasan;
            document.getElementById('satuan_bahan').value = b.satuan;
            document.getElementById('wastage').value = b.wastage;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- ELEGANT MODAL LOGIC ---
        function openModalHapus(id) {
            idBahanAkanDihapus = id;
            document.getElementById('modal-hapus').classList.remove('hidden');
        }

        function closeModalHapus() {
            document.getElementById('modal-hapus').classList.add('hidden');
            idBahanAkanDihapus = null;
        }

        document.getElementById('confirm-delete-btn').onclick = async () => {
            if (idBahanAkanDihapus) {
                const { error } = await supabaseClient.from('bahan_baku').delete().eq('id', idBahanAkanDihapus);
                if (!error) {
                    closeModalHapus();
                    showToast("DATA BERHASIL DIHAPUS 🗑️", "success");
                    muatDaftarBahan();
                } else {
                    showToast("GAGAL MENGHAPUS", "error");
                }
            }
        };
    </script>
</body>
</html>
