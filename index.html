<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .toast-custom {
            position: fixed;
            bottom: 100px;
            right: -10px;
            background: #1db15d;
            color: white;
            padding: 18px 45px 18px 25px;
            border-radius: 50px 0 0 50px;
            font-weight: bold;
            font-size: 13px;
            z-index: 9999;
            box-shadow: -4px 4px 12px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease-out forwards;
            line-height: 1.3;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .modal-overlay {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative flex flex-col">
        <header class="bg-[#2563eb] p-4 text-white text-center font-bold text-xl uppercase tracking-wider flex-none shadow-sm">
            SMART KALKULATOR HPP
        </header>

        <div class="flex border-b text-[11px] font-bold text-gray-400 bg-white sticky top-0 z-10 flex-none">
            <button class="w-1/3 py-4 border-b-2 border-blue-600 text-blue-600 uppercase">Database Bahan</button>
            <button class="w-1/3 py-4 uppercase cursor-not-allowed">Kalkulator</button>
            <button class="w-1/3 py-4 uppercase cursor-not-allowed">Grafik</button>
        </div>

        <div class="flex-grow overflow-y-auto p-4" style="padding-bottom: 100px;">
            <div id="tab-bahan" class="tab-content active">
                <div class="bg-white p-5 rounded-xl border border-blue-100 mb-6 shadow-sm">
                    <h3 id="form-title" class="font-bold text-blue-800 mb-4 text-[11px] uppercase tracking-wider">TAMBAH BAHAN BARU</h3>
                    <input type="hidden" id="edit-id">
                    
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" id="nama_bahan" placeholder="Nama Bahan" class="p-3 border border-gray-200 rounded-lg text-sm outline-none focus:border-blue-400">
                        
                        <select id="kategori_bahan" class="p-3 border border-gray-200 rounded-lg text-sm bg-gray-50 outline-none">
                            <option value="Karbo">Karbo</option>
                            <option value="Protein">Protein</option>
                            <option value="Sayur">Sayur</option>
                            <option value="Bumbu">Bumbu</option>
                            <option value="Lain-lain">Lain-lain</option>
                        </select>

                        <div class="flex gap-2">
                            <input type="number" id="harga_beli" placeholder="Harga Beli (Rp)" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                            <input type="number" id="isi_kemasan" placeholder="Isi Kemasan" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                        </div>
                        
                        <div class="flex gap-2">
                            <input type="text" id="satuan_bahan" placeholder="Satuan (gr/ml/pcs)" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                            <input type="number" id="wastage" placeholder="Wastage (%)" class="w-1/2 p-3 border border-gray-200 rounded-lg text-sm outline-none">
                        </div>

                        <button id="btn-simpan" onclick="simpanBahan()" class="w-full bg-[#1db15d] text-white p-3.5 rounded-lg font-bold shadow-sm hover:bg-green-600 transition-all uppercase text-sm">SIMPAN BAHAN</button>
                        <button id="btn-batal" onclick="resetForm()" class="hidden w-full bg-gray-400 text-white p-2 rounded-lg font-bold text-[10px] uppercase mt-1">Batal Edit</button>
                    </div>
                </div>

                <h3 class="font-bold mb-4 text-gray-700 text-[11px] uppercase tracking-widest">DAFTAR BAHAN</h3>
                <div id="list-bahan" class="space-y-3"></div>
            </div>
        </div>

        <div class="p-4 bg-white border-t flex-none text-center">
            <button onclick="handleLogout()" class="text-red-400 text-[10px] font-bold underline uppercase tracking-widest">Logout Dari Aplikasi</button>
        </div>
    </div>

    <div id="modal-hapus" class="hidden fixed inset-0 z-[1000] modal-overlay flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl w-full max-w-xs p-6 shadow-2xl">
            <h3 class="font-bold text-gray-800 text-lg mb-2">Hapus Bahan?</h3>
            <p class="text-gray-500 text-sm mb-6 leading-relaxed">Data bahan ini akan dihapus secara permanen dari sistem.</p>
            <div class="flex gap-3">
                <button onclick="closeModalHapus()" class="w-1/2 py-3 rounded-xl font-bold text-gray-400 bg-gray-100 uppercase text-[10px]">Batal</button>
                <button id="confirm-delete-btn" class="w-1/2 py-3 rounded-xl font-bold text-white bg-red-500 uppercase text-[10px] shadow-lg shadow-red-100">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script>
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let idHapus = null;

        function showToast(text) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement("div");
            toast.className = "toast-custom";
            toast.innerHTML = text + " ✅";
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.transform = "translateX(100%)";
                toast.style.transition = "0.4s";
                setTimeout(() => toast.remove(), 400);
            }, 3000);
        }

        async function simpanBahan() {
            const id = document.getElementById('edit-id').value;
            const user = (await supabaseClient.auth.getUser()).data.user;
            const payload = {
                user_id: user?.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                kategori: document.getElementById('kategori_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };

            if (!payload.nama_bahan) return;

            let res;
            if (id) {
                res = await supabaseClient.from('bahan_baku').update(payload).eq('id', id);
                if (!res.error) showToast("BERHASIL UPDATE<br>DATA BAHAN");
            } else {
                res = await supabaseClient.from('bahan_baku').insert([payload]);
                if (!res.error) showToast("BERHASIL SIMPAN<br>BAHAN");
            }

            if (!res.error) { resetForm(); muatDaftarBahan(); }
        }

        async function muatDaftarBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*').order('created_at', { ascending: false });
            const listDiv = document.getElementById('list-bahan');
            if (data) {
                listDiv.innerHTML = data.map(b => `
                    <div class="p-4 border border-gray-100 rounded-xl shadow-sm bg-white flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${b.nama_bahan} <span class="font-normal text-gray-400 text-[10px]">(${b.kategori})</span></p>
                            <p class="text-blue-600 font-bold text-xs mt-0.5">Rp ${b.harga_beli.toLocaleString()} / ${b.isi_kemasan} ${b.satuan}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='siapkanEdit(${JSON.stringify(b)})' class="bg-[#eff6ff] text-[#2563eb] font-bold px-4 py-2 rounded-lg text-[10px] uppercase">Edit</button>
                            <button onclick="openModalHapus(${b.id})" class="bg-white text-[#f43f5e] font-bold px-4 py-2 rounded-lg text-[10px] uppercase border border-red-50">Hapus</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function siapkanEdit(b) {
            document.getElementById('form-title').innerText = "EDIT BAHAN";
            document.getElementById('btn-simpan').innerText = "UPDATE DATA";
            document.getElementById('btn-batal').classList.remove('hidden');
            document.getElementById('edit-id').value = b.id;
            document.getElementById('nama_bahan').value = b.nama_bahan;
            document.getElementById('kategori_bahan').value = b.kategori;
            document.getElementById('harga_beli').value = b.harga_beli;
            document.getElementById('isi_kemasan').value = b.isi_kemasan;
            document.getElementById('satuan_bahan').value = b.satuan;
            document.getElementById('wastage').value = b.wastage;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "TAMBAH BAHAN BARU";
            document.getElementById('btn-simpan').innerText = "SIMPAN BAHAN";
            document.getElementById('edit-id').value = "";
            document.getElementById('btn-batal').classList.add('hidden');
            document.querySelectorAll('input').forEach(i => i.value = "");
        }

        function openModalHapus(id) {
            idHapus = id;
            document.getElementById('modal-hapus').classList.remove('hidden');
            document.getElementById('modal-hapus').classList.add('flex');
        }

        function closeModalHapus() {
            document.getElementById('modal-hapus').classList.add('hidden');
            document.getElementById('modal-hapus').classList.remove('flex');
        }

        document.getElementById('confirm-delete-btn').onclick = async () => {
            if (idHapus) {
                const { error } = await supabaseClient.from('bahan_baku').delete().eq('id', idHapus);
                if (!error) {
                    closeModalHapus();
                    showToast("BERHASIL HAPUS<br>BAHAN");
                    muatDaftarBahan();
                }
            }
        };

        window.onload = muatDaftarBahan;
    </script>
</body>
</html>
