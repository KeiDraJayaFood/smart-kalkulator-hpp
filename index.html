<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* POPUP NOTIFIKASI SESUAI INSTRUKSI (BUKAN ALERT BROWSER) */
        #toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            width: 90%;
            max-width: 320px;
        }
        .toast {
            background: #1f2937; /* Gelap Profesional */
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 8px;
            animation: slideDown 0.4s ease-out forwards;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-sm relative">
        
        <!-- HEADER PERSIS SCREENSHOT -->
        <header class="bg-[#2563eb] p-5 text-white text-center font-extrabold text-xl tracking-tight">
            SMART KALKULATOR HPP
        </header>

        <!-- LOGIN SECTION -->
        <div id="login-section" class="p-8">
            <h2 class="text-center font-bold text-gray-800 mb-8 text-lg">Akses Pengguna</h2>
            <input type="email" id="email" placeholder="nurlailiabdulazis@gmail.com" class="w-full p-4 border border-gray-200 rounded-lg mb-4 outline-none bg-blue-50/30 focus:border-blue-500">
            <input type="password" id="password" placeholder="••••••" class="w-full p-4 border border-gray-200 rounded-lg mb-6 outline-none bg-blue-50/30 focus:border-blue-500">
            <div class="flex gap-3">
                <button onclick="handleLogin()" class="w-1/2 bg-[#2563eb] text-white p-4 rounded-lg font-bold">LOGIN</button>
                <button onclick="handleSignUp()" class="w-1/2 bg-[#e5e7eb] text-gray-700 p-4 rounded-lg font-bold">DAFTAR BARU</button>
            </div>
        </div>

        <!-- MAIN SECTION -->
        <div id="main-section" class="hidden">
            <!-- TAB NAVIGASI -->
            <div class="flex border-b font-bold text-gray-500 text-[12px] uppercase tracking-wider">
                <button onclick="openTab('tab-bahan')" id="btn-tab-bahan" class="w-1/3 py-4 border-b-2 border-blue-600 text-blue-600">Database Bahan</button>
                <button onclick="openTab('tab-kalkulator')" id="btn-tab-kalkulator" class="w-1/3 py-4">Kalkulator</button>
                <button onclick="openTab('tab-grafik')" id="btn-tab-grafik" class="w-1/3 py-4">Grafik</button>
            </div>

            <div id="tab-bahan" class="tab-content active p-4">
                <div class="mb-6">
                    <h3 id="form-title" class="font-extrabold text-blue-700 mb-4 text-sm uppercase">Tambah Bahan Baru</h3>
                    <input type="hidden" id="edit-id">
                    
                    <input type="text" id="nama_bahan" placeholder="Nama Bahan" class="w-full p-3 border rounded-lg mb-3 outline-none focus:ring-1 focus:ring-blue-400">
                    
                    <select id="kategori_bahan" class="w-full p-3 border rounded-lg mb-3 bg-white outline-none">
                        <option value="Karbo">Karbo</option>
                        <option value="Protein">Protein</option>
                        <option value="Sayur">Sayur</option>
                        <option value="Bumbu">Bumbu</option>
                        <option value="Lain-lain">Lain-lain</option>
                    </select>

                    <div class="flex gap-2 mb-3">
                        <input type="number" id="harga_beli" placeholder="Harga Beli" class="w-1/2 p-3 border rounded-lg outline-none">
                        <input type="number" id="isi_kemasan" placeholder="Isi / Berat" class="w-1/2 p-3 border rounded-lg outline-none">
                    </div>
                    
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="satuan_bahan" placeholder="Satuan (gr/ml)" class="w-1/2 p-3 border rounded-lg outline-none">
                        <input type="number" id="wastage" placeholder="Wastage %" class="w-1/2 p-3 border rounded-lg outline-none">
                    </div>

                    <button id="btn-simpan" onclick="simpanBahan()" class="w-full bg-blue-600 text-white p-3.5 rounded-lg font-bold text-sm uppercase tracking-widest shadow-md">Simpan Bahan</button>
                    <button id="btn-batal" onclick="resetForm()" class="hidden w-full bg-gray-400 text-white p-2 rounded-lg mt-2 text-[10px] font-bold">BATAL EDIT</button>
                </div>
                
                <hr class="mb-6">
                <h3 class="font-extrabold text-gray-800 mb-4 text-sm uppercase">Daftar Bahan</h3>
                <div id="list-bahan" class="space-y-3 pb-20"></div>
            </div>

            <div id="tab-kalkulator" class="tab-content p-10 text-center text-gray-400 italic">Fitur Kalkulator segera hadir.</div>
            <div id="tab-grafik" class="tab-content p-10 text-center text-gray-400 italic">Fitur Grafik segera hadir.</div>

            <button onclick="handleLogout()" class="w-full text-red-600 text-[11px] font-bold mt-10 mb-20 uppercase tracking-widest">Logout dari Aplikasi</button>
        </div>
    </div>

    <!-- NOTIFIKASI DIBUAT DISINI -->
    <div id="toast-container"></div>

    <script>
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // FUNGSI POPUP PENGGANTI ALERT BROWSER
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showToast("Login Gagal! Periksa Email/Password");
            else location.reload();
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) showToast("Daftar Gagal: " + error.message);
            else showToast("Pendaftaran Berhasil! Silakan Login.");
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-section').classList.remove('hidden');
                muatDaftarBahan();
            }
        };

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('#main-section button').forEach(b => {
                if(b.id && b.id.includes('btn-tab')) {
                    b.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
                    b.classList.add('text-gray-500');
                }
            });
            document.getElementById('btn-' + tabId).classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
        }

        async function simpanBahan() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const id = document.getElementById('edit-id').value;
            const payload = {
                user_id: user.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                kategori: document.getElementById('kategori_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };

            if(!payload.nama_bahan || !payload.harga_beli) return showToast("Data belum lengkap!");

            let res;
            if (id) {
                res = await supabaseClient.from('bahan_baku').update(payload).eq('id', id);
                if (!res.error) showToast("Bahan berhasil diperbarui!");
            } else {
                res = await supabaseClient.from('bahan_baku').insert([payload]);
                if (!res.error) showToast("Bahan berhasil disimpan!");
            }

            if (res.error) showToast("Terjadi kesalahan sistem.");
            else { resetForm(); muatDaftarBahan(); }
        }

        async function muatDaftarBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('list-bahan');
            if (data) {
                list.innerHTML = data.map(b => `
                    <div class="p-4 border rounded-lg bg-white shadow-sm flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${b.nama_bahan} <span class="text-xs font-normal text-gray-400">(${b.kategori})</span></p>
                            <p class="text-blue-600 font-bold text-xs">Rp ${b.harga_beli.toLocaleString()} / ${b.isi_kemasan} ${b.satuan}</p>
                            <p class="text-[10px] text-gray-400 mt-1 italic">${new Date(b.created_at).toLocaleString('id-ID')}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='siapkanEdit(${JSON.stringify(b)})' class="text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1.5 rounded-md">EDIT</button>
                            <button onclick="hapusBahan(${b.id})" class="text-xs font-bold text-red-500 bg-red-50 px-3 py-1.5 rounded-md">HAPUS</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function siapkanEdit(b) {
            document.getElementById('form-title').innerText = "Edit Data Bahan";
            document.getElementById('edit-id').value = b.id;
            document.getElementById('nama_bahan').value = b.nama_bahan;
            document.getElementById('kategori_bahan').value = b.kategori;
            document.getElementById('harga_beli').value = b.harga_beli;
            document.getElementById('isi_kemasan').value = b.isi_kemasan;
            document.getElementById('satuan_bahan').value = b.satuan;
            document.getElementById('wastage').value = b.wastage;
            document.getElementById('btn-simpan').innerText = "UPDATE BAHAN";
            document.getElementById('btn-batal').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "Tambah Bahan Baru";
            document.getElementById('edit-id').value = "";
            document.getElementById('nama_bahan').value = "";
            document.getElementById('harga_beli').value = "";
            document.getElementById('isi_kemasan').value = "";
            document.getElementById('satuan_bahan').value = "";
            document.getElementById('wastage').value = "";
            document.getElementById('btn-simpan').innerText = "SIMPAN BAHAN";
            document.getElementById('btn-batal').classList.add('hidden');
        }

        async function hapusBahan(id) {
            if(confirm("Yakin ingin menghapus?")) {
                const { error } = await supabaseClient.from('bahan_baku').delete().eq('id', id);
                if(!error) { showToast("Bahan telah dihapus."); muatDaftarBahan(); }
            }
        }
    </script>
</body>
</html>
