<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* POPUP NOTIFIKASI DALAM APLIKASI */
        #toast-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
        }
        .toast {
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            margin-bottom: 8px;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative">
        <!-- HEADER AWAL -->
        <header class="bg-[#2563eb] p-4 text-white text-center font-bold text-lg uppercase tracking-wide">
            SMART KALKULATOR HPP
        </header>

        <!-- SECTION LOGIN (SESUAI SCREENSHOT AWAL) -->
        <div id="login-section" class="p-6">
            <h2 class="text-center font-bold text-gray-700 mb-6 uppercase text-sm">Akses Pengguna</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded-md mb-3 text-sm outline-none focus:border-blue-500">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-md mb-4 text-sm outline-none focus:border-blue-500">
            <div class="flex gap-2">
                <button onclick="handleLogin()" class="w-1/2 bg-blue-600 text-white p-3 rounded-md font-bold text-sm uppercase">Login</button>
                <button onclick="handleSignUp()" class="w-1/2 bg-gray-200 text-gray-600 p-3 rounded-md font-bold text-sm uppercase">Daftar Baru</button>
            </div>
        </div>

        <!-- MAIN APP SECTION -->
        <div id="main-section" class="hidden">
            <!-- TAB NAVIGATION -->
            <div class="flex border-b text-[11px] font-bold text-gray-400 uppercase">
                <button onclick="openTab('tab-bahan')" id="btn-tab-bahan" class="w-1/3 py-4 border-b-2 border-blue-600 text-blue-600">Database Bahan</button>
                <button onclick="openTab('tab-kalkulator')" id="btn-tab-kalkulator" class="w-1/3 py-4">Kalkulator</button>
                <button onclick="openTab('tab-grafik')" id="btn-tab-grafik" class="w-1/3 py-4">Grafik</button>
            </div>

            <!-- TAB 1: DATABASE BAHAN -->
            <div id="tab-bahan" class="tab-content active p-4">
                <div class="bg-[#f9fbff] p-5 rounded-lg border border-blue-50 mb-6">
                    <h3 id="form-title" class="font-bold text-blue-800 mb-4 text-xs uppercase tracking-wider">Tambah Bahan Baru</h3>
                    <input type="hidden" id="edit-id">
                    
                    <input type="text" id="nama_bahan" placeholder="Nama Bahan" class="w-full p-2.5 border rounded-md mb-3 text-sm outline-none bg-white">
                    
                    <select id="kategori_bahan" class="w-full p-2.5 border rounded-md mb-3 bg-white text-sm text-gray-600 outline-none">
                        <option value="Karbo">Karbo</option>
                        <option value="Protein">Protein</option>
                        <option value="Sayur">Sayur</option>
                        <option value="Bumbu">Bumbu</option>
                        <option value="Lain-lain">Lain-lain</option>
                    </select>

                    <div class="flex gap-2 mb-3">
                        <input type="number" id="harga_beli" placeholder="Harga Beli" class="w-1/2 p-2.5 border rounded-md text-sm outline-none bg-white">
                        <input type="number" id="isi_kemasan" placeholder="Berat/Isi" class="w-1/2 p-2.5 border rounded-md text-sm outline-none bg-white">
                    </div>
                    
                    <div class="flex gap-2 mb-5">
                        <input type="text" id="satuan_bahan" placeholder="Satuan (gr/ml)" class="w-1/2 p-2.5 border rounded-md text-sm outline-none bg-white">
                        <input type="number" id="wastage" placeholder="Wastage %" class="w-1/2 p-2.5 border rounded-md text-sm outline-none bg-white">
                    </div>

                    <button id="btn-simpan" onclick="simpanBahan()" class="w-full bg-blue-600 text-white p-3 rounded-md font-bold text-sm uppercase shadow-sm active:scale-95 transition-transform">Simpan Bahan</button>
                    <button id="btn-batal" onclick="resetForm()" class="hidden w-full bg-gray-400 text-white p-2 rounded-md mt-2 text-[10px] font-bold uppercase">Batal Edit</button>
                </div>
                
                <h3 class="font-bold text-gray-400 mb-4 text-[10px] uppercase tracking-[0.2em]">Daftar Bahan</h3>
                <div id="list-bahan" class="space-y-3 pb-20">
                    <!-- Item list akan muncul di sini -->
                </div>
            </div>

            <!-- TAB LAIN -->
            <div id="tab-kalkulator" class="tab-content p-10 text-center text-gray-400 text-sm italic">Fitur segera hadir.</div>
            <div id="tab-grafik" class="tab-content p-10 text-center text-gray-400 text-sm italic">Fitur segera hadir.</div>

            <button onclick="handleLogout()" class="w-full text-red-400 text-[10px] mt-10 mb-10 underline uppercase font-bold">Logout Dari Aplikasi</button>
        </div>
    </div>

    <!-- NOTIFIKASI CONTAINER -->
    <div id="toast-container"></div>

    <script>
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // POPUP NOTIFIKASI (MENGGANTIKAN ALERT)
        function showToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => { toast.remove(); }, 3000);
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showToast("Login Gagal! ❌");
            else location.reload();
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) showToast(error.message);
            else showToast("Daftar Berhasil! ✅");
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('main-section').classList.remove('hidden');
                muatDaftarBahan();
            }
        };

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('#main-section button').forEach(b => {
                if(b.id && b.id.includes('btn-tab')) {
                    b.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
                    b.classList.add('text-gray-400');
                }
            });
            document.getElementById('btn-' + tabId).classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
            document.getElementById('btn-' + tabId).classList.remove('text-gray-400');
        }

        async function simpanBahan() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const id = document.getElementById('edit-id').value;
            const payload = {
                user_id: user.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                kategori: document.getElementById('kategori_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };

            if(!payload.nama_bahan || !payload.harga_beli) return showToast("Lengkapi data! ⚠️");

            let res;
            if (id) {
                res = await supabaseClient.from('bahan_baku').update(payload).eq('id', id);
                if (!res.error) showToast("Bahan diperbarui! ✅");
            } else {
                res = await supabaseClient.from('bahan_baku').insert([payload]);
                if (!res.error) showToast("Bahan disimpan! ✅");
            }

            if (!res.error) { resetForm(); muatDaftarBahan(); }
        }

        async function muatDaftarBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('list-bahan');
            if (data) {
                list.innerHTML = data.map(b => `
                    <div class="p-4 bg-white border border-gray-100 rounded-md shadow-sm flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${b.nama_bahan} <span class="text-[10px] font-normal text-gray-400">(${b.kategori})</span></p>
                            <p class="text-blue-600 font-bold text-xs mt-1">Rp ${b.harga_beli.toLocaleString()} / ${b.isi_kemasan} ${b.satuan}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='siapkanEdit(${JSON.stringify(b)})' class="text-[10px] font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded">EDIT</button>
                            <button onclick="hapusBahan(${b.id})" class="text-[10px] font-bold text-red-400 bg-red-50 px-3 py-1 rounded">HAPUS</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function siapkanEdit(b) {
            document.getElementById('form-title').innerText = "Edit Bahan";
            document.getElementById('edit-id').value = b.id;
            document.getElementById('nama_bahan').value = b.nama_bahan;
            document.getElementById('kategori_bahan').value = b.kategori;
            document.getElementById('harga_beli').value = b.harga_beli;
            document.getElementById('isi_kemasan').value = b.isi_kemasan;
            document.getElementById('satuan_bahan').value = b.satuan;
            document.getElementById('wastage').value = b.wastage;
            document.getElementById('btn-simpan').innerText = "Update Bahan";
            document.getElementById('btn-batal').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "Tambah Bahan Baru";
            document.getElementById('edit-id').value = "";
            document.getElementById('nama_bahan').value = "";
            document.getElementById('harga_beli').value = "";
            document.getElementById('isi_kemasan').value = "";
            document.getElementById('satuan_bahan').value = "";
            document.getElementById('wastage').value = "";
            document.getElementById('btn-simpan').innerText = "Simpan Bahan";
            document.getElementById('btn-batal').classList.add('hidden');
        }

        async function hapusBahan(id) {
            if(confirm("Hapus bahan ini?")) {
                const { error } = await supabaseClient.from('bahan_baku').delete().eq('id', id);
                if(!error) { showToast("Bahan dihapus! 🗑️"); muatDaftarBahan(); }
            }
        }
    </script>
</body>
</html>
