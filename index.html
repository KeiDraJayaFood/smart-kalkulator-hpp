<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART Kalkulator HPP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .toast-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative pb-20">
        <header class="bg-blue-600 p-4 text-white text-center font-bold text-xl shadow-md uppercase">SMART Kalkulator HPP</header>

        <!-- SECTION: LOGIN -->
        <div id="login-section" class="p-6">
            <h2 class="text-center text-lg font-semibold mb-4 text-gray-700">Akses Pengguna</h2>
            <input type="email" id="email" placeholder="Email" class="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <div class="flex gap-2">
                <button onclick="handleLogin()" class="w-1/2 bg-blue-600 text-white p-3 rounded-lg font-bold hover:bg-blue-700 transition">LOGIN</button>
                <button onclick="handleSignUp()" class="w-1/2 bg-gray-200 text-gray-700 p-3 rounded-lg font-bold text-sm">DAFTAR</button>
            </div>
        </div>

        <!-- SECTION: UTAMA -->
        <div id="main-section" class="hidden">
            <div class="flex border-b text-[10px] font-bold bg-gray-50">
                <button onclick="openTab('tab-bahan')" id="btn-tab-bahan" class="w-1/3 py-3 border-b-2 border-blue-600 text-blue-600 uppercase">Database Bahan</button>
                <button onclick="openTab('tab-kalkulator')" id="btn-tab-kalkulator" class="w-1/3 py-3 text-gray-500 uppercase">Kalkulator</button>
                <button onclick="openTab('tab-grafik')" id="btn-tab-grafik" class="w-1/3 py-3 text-gray-500 uppercase">Grafik</button>
            </div>

            <!-- TAB: DATABASE BAHAN -->
            <div id="tab-bahan" class="tab-content active p-4">
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 mb-6 shadow-sm">
                    <h3 id="form-title" class="font-bold text-blue-800 mb-3 text-xs uppercase">Tambah Bahan Baru</h3>
                    <input type="hidden" id="edit-id">
                    <input type="text" id="nama_bahan" placeholder="Nama Bahan" class="w-full p-2 border rounded mb-2 text-sm">
                    <div class="flex gap-2 mb-2">
                        <input type="number" id="harga_beli" placeholder="Harga Beli" class="w-1/2 p-2 border rounded text-sm">
                        <input type="number" id="isi_kemasan" placeholder="Isi/Berat" class="w-1/2 p-2 border rounded text-sm">
                    </div>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="satuan_bahan" placeholder="Satuan (gr/ml)" class="w-1/2 p-2 border rounded text-sm">
                        <input type="number" id="wastage" placeholder="Wastage %" class="w-1/2 p-2 border rounded text-sm">
                    </div>
                    <div class="flex gap-2">
                        <button id="btn-simpan" onclick="simpanBahan()" class="w-full bg-green-600 text-white p-2 rounded-lg font-bold shadow-md">SIMPAN BAHAN</button>
                        <button id="btn-batal" onclick="resetForm()" class="hidden w-1/3 bg-gray-400 text-white p-2 rounded-lg font-bold">BATAL</button>
                    </div>
                </div>
                
                <h3 class="font-bold text-gray-600 mb-3 text-xs uppercase">Daftar Bahan Anda</h3>
                <div id="list-bahan" class="space-y-3"></div>
            </div>

            <!-- TAB: KALKULATOR -->
            <div id="tab-kalkulator" class="tab-content p-4">
                <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 text-center italic text-gray-400">
                    Fitur Kalkulator sedang sinkronisasi...
                </div>
            </div>

            <button onclick="handleLogout()" class="w-full text-red-400 text-[10px] mt-10 mb-10 underline">LOGOUT DARI APLIKASI</button>
        </div>
    </div>

    <!-- NOTIFIKASI TOAST -->
    <div id="toast-container"></div>

    <script>
        const SUPABASE_URL = "https://dyqqjciibbpwujrgvlpc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5cXFqY2lpYmJwd3Vqcmd2bHBjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg3MTQ1NTgsImV4cCI6MjA5NDI5MDU1OH0.slED2x8TrP8IzGzGxa58wkpxNcSCzsgqPRSXoup_N0M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- NOTIFIKASI PROFESIONAL ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const color = type === 'success' ? 'bg-green-600' : 'bg-red-600';
            toast.className = `fixed bottom-10 left-1/2 -translate-x-1/2 ${color} text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm z-50 toast-animate`;
            toast.innerText = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // --- AUTHENTICATION ---
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) showToast(error.message, 'error');
            else location.reload();
        }

        async function handleSignUp() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) showToast(error.message, 'error');
            else showToast("Pendaftaran berhasil! Silakan Login.");
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }

        window.onload = async () => {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('main-section').classList.remove('hidden');
                muatDaftarBahan();
            }
        };

        // --- DATABASE BAHAN (SIMPAN & EDIT) ---
        async function simpanBahan() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            const id = document.getElementById('edit-id').value;
            const payload = {
                user_id: user.id,
                nama_bahan: document.getElementById('nama_bahan').value,
                harga_beli: parseFloat(document.getElementById('harga_beli').value),
                isi_kemasan: parseFloat(document.getElementById('isi_kemasan').value),
                satuan: document.getElementById('satuan_bahan').value,
                wastage: parseFloat(document.getElementById('wastage').value) || 0
            };

            let response;
            if (id) {
                response = await supabaseClient.from('bahan_baku').update(payload).eq('id', id);
            } else {
                response = await supabaseClient.from('bahan_baku').insert([payload]);
            }

            if (response.error) showToast(response.error.message, 'error');
            else {
                showToast(id ? "PERUBAHAN DISIMPAN ✅" : "BERHASIL SIMPAN BAHAN ✅");
                resetForm();
                muatDaftarBahan();
            }
        }

        async function muatDaftarBahan() {
            const { data } = await supabaseClient.from('bahan_baku').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('list-bahan');
            if (data) {
                list.innerHTML = data.map(b => `
                    <div class="p-3 bg-white border rounded-lg shadow-sm flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${b.nama_bahan}</p>
                            <p class="text-blue-600 text-xs font-semibold">Rp ${b.harga_beli.toLocaleString()} / ${b.isi_kemasan} ${b.satuan}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='siapkanEdit(${JSON.stringify(b)})' class="text-blue-500 text-[10px] font-bold border border-blue-200 px-2 py-1 rounded">EDIT</button>
                            <button onclick="hapusBahan(${b.id})" class="text-red-500 text-[10px] font-bold border border-red-200 px-2 py-1 rounded">HAPUS</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        function siapkanEdit(bahan) {
            document.getElementById('form-title').innerText = "Edit Bahan";
            document.getElementById('edit-id').value = bahan.id;
            document.getElementById('nama_bahan').value = bahan.nama_bahan;
            document.getElementById('harga_beli').value = bahan.harga_beli;
            document.getElementById('isi_kemasan').value = bahan.isi_kemasan;
            document.getElementById('satuan_bahan').value = bahan.satuan;
            document.getElementById('wastage').value = bahan.wastage;
            
            document.getElementById('btn-simpan').innerText = "UPDATE BAHAN";
            document.getElementById('btn-batal').classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "Tambah Bahan Baru";
            document.getElementById('edit-id').value = "";
            document.getElementById('nama_bahan').value = "";
            document.getElementById('harga_beli').value = "";
            document.getElementById('isi_kemasan').value = "";
            document.getElementById('satuan_bahan').value = "";
            document.getElementById('wastage').value = "";
            document.getElementById('btn-simpan').innerText = "SIMPAN BAHAN";
            document.getElementById('btn-batal').classList.add('hidden');
        }

        async function hapusBahan(id) {
            if(confirm("Hapus bahan ini?")) {
                await supabaseClient.from('bahan_baku').delete().eq('id', id);
                showToast("BAHAN DIHAPUS");
                muatDaftarBahan();
            }
        }

        function openTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.querySelectorAll('.flex button').forEach(b => {
                b.classList.remove('border-b-2', 'border-blue-600', 'text-blue-600');
                b.classList.add('text-gray-500');
            });
            document.getElementById('btn-' + tabId).classList.add('border-b-2', 'border-blue-600', 'text-blue-600');
        }
    </script>
</body>
</html>
